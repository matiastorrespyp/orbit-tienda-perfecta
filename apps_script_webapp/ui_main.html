<style>

}

/* Colores cumplimiento gerencia */
.pct-ok   { color: #6EC531; font-weight: 700; }
.pct-warn { color: #FFD060; font-weight: 700; }

.footer-note {

<!-- Login -->
<div id="login-section">
  <div class="login-card">
    <div class="logo-area">
      <div class="orbit-badge">O</div>

    <form onsubmit="handleLogin(event)">
      <div class="field">
        <label>Número de vendedor o "gerencia"</label>

               autocapitalize="none"
               inputmode="text">

               placeholder="••••••••"
               autocomplete="current-password">

      <button type="submit" class="btn-primary" id="btn-login">Ingresar</button>

<script>
// ─── Estado ───────────────────────────────────────────────────────────────────
let _rol = null;
let _id  = null;

// ─── Login ────────────────────────────────────────────────────────────────────
function handleLogin(e) {
  e.preventDefault();
  const id   = document.getElementById('input-id').value.trim().toLowerCase();
  const pass = document.getElementById('input-pass').value;
  const errEl = document.getElementById('login-error');

  errEl.textContent = '';
  if (!id || !pass) {
    errEl.textContent = 'Completá todos los campos.';
    return;
  }

  setLoading(true);
  document.getElementById('btn-login').disabled = true;

  google.script.run
    .withSuccessHandler(onAuth)
    .withFailureHandler(onError)
    .autenticar(id, pass);
}

function onAuth(res) {
  setLoading(false);
  document.getElementById('btn-login').disabled = false;

  if (!res.ok) {
    document.getElementById('login-error').textContent = 'Número o contraseña incorrectos.';
    return;
  }

  _rol = res.rol;
  _id  = res.id || null;
  document.getElementById('login-section').style.display = 'none';

  if (res.rol === 'vendedor') cargarVendedor(res.id);
  else                        cargarGerencia();
}

// ─── Vendedor ─────────────────────────────────────────────────────────────────
function cargarVendedor(id) {
  setLoading(true);
  google.script.run
    .withSuccessHandler(renderVendedor)
    .withFailureHandler(onError)
    .getDatosVendedor(id);
}

function renderVendedor(d) {
  setLoading(false);
  if (!d.ok) { mostrarErrorGlobal(d.error || 'Error al cargar datos.'); return; }

  document.getElementById('v-nombre').textContent = d.nombre;
  document.getElementById('v-fecha').textContent  = fmtFecha(d.fecha);

  // PDF
  const pdfSec = document.getElementById('v-pdf-section');
  if (d.pdfUrl) {
    pdfSec.innerHTML =
      '<a href="' + d.pdfUrl + '" target="_blank" rel="noopener" class="btn-pdf">' +
        '<span class="btn-pdf-icon">📄</span> Ver PDF del día' +
      '</a>' +
      '<p class="pdf-meta">Fecha: ' + fmtFecha(d.pdfFecha) + ' · Se abre en Google Drive</p>';
  } else {
    pdfSec.innerHTML =
      '<div class="pdf-unavail">PDF no disponible aún.<br>' +
      'Ejecutá el pipeline y el sync primero.</div>';
  }

  // Clientes
  renderClientes(d.clientes);
  // Focos
  renderFocos(d.focos);

  document.getElementById('vendedor-section').style.display = 'block';
}

function renderClientes(rows) {
  const wrap = document.getElementById('v-clientes-wrap');
  if (!rows || !rows.length) {
    wrap.innerHTML = '<div class="empty-state">Sin clientes para hoy.</div>';
    return;
  }
  const tbody = rows.map(function(c) {
    const pct    = Math.min(parseFloat(c.PortafolioPct) || 0, 100);
    const barW   = Math.round(pct * 0.55);
    const esTP   = c.TP_Aplica === '1' || /^s[ií]/i.test(c.TP_Aplica) || c.TP_Aplica === 'True';
    return '<tr>' +
      '<td><div class="client-name">' + esc(c.RazonSocial) + '</div>' +
           '<div class="client-local">' + esc(c.Localidad) + '</div></td>' +
      '<td><div class="pct-cell">' +
           '<div class="pct-bar" style="width:' + barW + 'px"></div>' +
           '<span>' + pct.toFixed(0) + '%</span></div></td>' +
      '<td style="text-align:center">' + (c.Faltan80 || '0') + '</td>' +
      '<td>' + (esTP
        ? '<span class="badge-tp">TP</span>'
        : '<span class="badge-no">No</span>') + '</td>' +
    '</tr>';
  }).join('');
  wrap.innerHTML =
    '<div class="table-wrap"><table>' +
    '<thead><tr><th>Cliente</th><th>Portafolio</th><th>Faltan 80%</th><th>TP</th></tr></thead>' +
    '<tbody>' + tbody + '</tbody></table></div>';
}

function renderFocos(rows) {
  const wrap = document.getElementById('v-focos-wrap');
  if (!rows || !rows.length) {
    wrap.innerHTML = '<div class="empty-state">Sin focos para hoy.</div>';
    return;
  }
  const tbody = rows.map(function(f) {
    return '<tr>' +
      '<td><span class="rank-num">#' + (f.Rank || '—') + '</span></td>' +
      '<td>' + esc(f.Articulo) + '</td>' +
      '<td style="text-align:center">' + (f.CantClientes || '0') + '</td>' +
    '</tr>';
  }).join('');
  wrap.innerHTML =
    '<div class="table-wrap"><table>' +
    '<thead><tr><th>#</th><th>Artículo</th><th>Clientes</th></tr></thead>' +
    '<tbody>' + tbody + '</tbody></table></div>';
}

// ─── Gerencia ─────────────────────────────────────────────────────────────────
function cargarGerencia() {
  setLoading(true);
  google.script.run
    .withSuccessHandler(renderGerencia)
    .withFailureHandler(onError)
    .getDatosGerencia();
}

function renderGerencia(d) {
  setLoading(false);
  if (!d.ok) { mostrarErrorGlobal(d.error || 'Error al cargar datos.'); return; }

  document.getElementById('g-fecha').textContent = fmtFecha(d.fecha);

  renderObjetivos(d.objetivos);
  renderFacturacion(d.facturacion);

  document.getElementById('gerencia-section').style.display = 'block';
}

function renderObjetivos(rows) {
  const wrap = document.getElementById('g-objetivos-wrap');
  if (!rows || !rows.length) {
    wrap.innerHTML =
      '<div class="empty-state">Sin datos de objetivos.<br>' +
      'Verificá que la hoja "tp_objetivos_resumen" esté sincronizada<br>' +
      '(ver README_DEPLOY.md → Paso extra gerencia).</div>';
    return;
  }
  const tbody = rows.map(function(o) {
    const pct   = parseFloat(o.CumplimientoPct) || 0;
    const cls   = pct >= 100 ? 'pct-ok' : pct >= 70 ? 'pct-warn' : 'pct-low';
    return '<tr>' +
      '<td>' + esc(o.VendedorNombre) + '</td>' +
      '<td style="text-align:right">' + fmtNum(o.Objetivo)  + '</td>' +
      '<td style="text-align:right">' + fmtNum(o.Acumulado) + '</td>' +
      '<td style="text-align:right">' + fmtNum(o.RealDia)   + '</td>' +
      '<td style="text-align:right"><span class="' + cls + '">' + pct.toFixed(1) + '%</span></td>' +
    '</tr>';
  }).join('');
  wrap.innerHTML =
    '<div class="table-wrap"><table>' +
    '<thead><tr>' +
      '<th>Vendedor</th>' +
      '<th style="text-align:right">Objetivo</th>' +
      '<th style="text-align:right">Acumulado</th>' +
      '<th style="text-align:right">Hoy</th>' +
      '<th style="text-align:right">Cumpl.</th>' +
    '</tr></thead>' +
    '<tbody>' + tbody + '</tbody></table></div>';
}

function renderFacturacion(rows) {
  const wrap = document.getElementById('g-facturacion-wrap');
  if (!rows || !rows.length) {
    wrap.innerHTML =
      '<div class="empty-state">Sin datos de facturación.<br>' +
      'Verificá que la hoja "tp_facturacion_comparativa" esté sincronizada<br>' +
      '(ver README_DEPLOY.md → Paso extra gerencia).</div>';
    return;
  }
  const tbody = rows.slice(0, 30).map(function(f) {
    const diff  = parseFloat(f.DiferenciaFacturacionPct) || 0;
    const sign  = diff >= 0 ? '+' : '';
    const cls   = diff >= 0 ? 'pct-ok' : 'pct-low';
    return '<tr>' +
      '<td>' + esc(f.VendedorNombre || f.Scope || '—') + '</td>' +
      '<td style="text-align:right">' + fmtNum(f.FacturacionTP)    + '</td>' +
      '<td style="text-align:right">' + fmtNum(f.FacturacionNoTP)  + '</td>' +
      '<td style="text-align:right"><span class="' + cls + '">' + sign + diff.toFixed(1) + '%</span></td>' +
    '</tr>';
  }).join('');
  wrap.innerHTML =
    '<div class="table-wrap"><table>' +
    '<thead><tr>' +
      '<th>Vendedor</th>' +
      '<th style="text-align:right">Fact. TP</th>' +
      '<th style="text-align:right">Fact. No TP</th>' +
      '<th style="text-align:right">Diferencia</th>' +
    '</tr></thead>' +
    '<tbody>' + tbody + '</tbody></table></div>';
}

// ─── Utilidades ───────────────────────────────────────────────────────────────
function setLoading(on) {
  document.getElementById('loading-overlay').classList.toggle('visible', on);
}

function onError(err) {
  setLoading(false);
  document.getElementById('btn-login').disabled = false;
  mostrarErrorGlobal('Error de conexión. Intentá de nuevo en unos segundos.');
  console.error(err);
}

function mostrarErrorGlobal(msg) {
  document.getElementById('vendedor-section').style.display = 'none';
  document.getElementById('gerencia-section').style.display = 'none';
  document.getElementById('login-section').style.display    = 'flex';
  document.getElementById('login-error').textContent        = msg;
}

function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtNum(val) {
  var n = parseFloat(val) || 0;
  return n.toLocaleString('es-AR', { maximumFractionDigits: 0 });
}

function fmtFecha(f) {
  if (!f) return '—';
  var p = String(f).split('-');
  return p.length === 3 ? p[2]+'/'+p[1]+'/'+p[0] : f;
}
</script>
